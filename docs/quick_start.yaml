# 1) Import a map image from /config path
service: padspan_ha.import_map_image
data:
  map_id: main_floor
  source_path: www/maps/main_floor.png
  name: Main Floor
  activate: true

---
# 2) Place scanner anchors for that map
service: padspan_ha.set_map_anchor
data:
  map_id: main_floor
  source_id: bermuda_living_room
  x: 420
  y: 180
  z: 0
  weight: 1.0
  label: Living Room Proxy

---
service: padspan_ha.set_map_anchor
data:
  map_id: main_floor
  source_id: bermuda_office
  x: 160
  y: 310
  z: 0
  weight: 1.0
  label: Office Proxy

---
# 3) Force immediate refresh
service: padspan_ha.reload_ble_cache
data: {}
