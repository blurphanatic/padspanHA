<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PadSpan Sidebar Lab</title>
  <link rel="icon" type="image/svg+xml" href="/padspan_ha_static/assets/favicon.svg"/>
  <style>
    :root{--bg:#0b0f14;--bg2:#101827;--txt:#e8eef7;--muted:#9bb1cc;--line:#253447;--card:#131d2b;--side:#0f172a;}
    *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:Inter,system-ui}
    .wrap{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .wrap.mini{grid-template-columns:84px 1fr}
    .side{background:var(--side);border-right:1px solid var(--line);overflow:auto}
    .brand{display:flex;gap:10px;align-items:center;padding:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:inherit}
    .brand img{width:30px;height:30px}.mini .brand .t{display:none}
    .menu{padding:10px;display:grid;gap:6px}
    .group{font-size:.72rem;color:var(--muted);text-transform:uppercase;padding:6px 8px}
    .item{display:flex;gap:10px;align-items:center;padding:10px;border-radius:10px;border:1px solid transparent;cursor:pointer}
    .item:hover{background:#132338;border-color:#274664}.item.active{background:#173250;border-color:#2c5880}
    .mini .item .label,.mini .group{display:none}
    .main{display:grid;grid-template-rows:auto auto 1fr}
    .top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
    .btn{background:#132338;border:1px solid #2a4667;color:var(--txt);padding:7px 10px;border-radius:10px;cursor:pointer}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;padding:12px;border-bottom:1px solid var(--line);background:var(--bg2)}
    select{width:100%;padding:8px;border-radius:10px;border:1px solid #31557a;background:#10223a;color:#eaf1fb}
    .cards{padding:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
    .scrim{position:fixed;inset:0;background:rgba(5,10,20,.58);display:none}
    body.scrim .scrim{display:block}
    body.layout-overlay .wrap, body.layout-offcanvas .wrap{grid-template-columns:1fr}
    body.layout-overlay .side, body.layout-offcanvas .side{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);width:280px;z-index:30;transition:.2s}
    body.open .side{transform:translateX(0)}
    body.layout-floating .side{margin:10px;border-radius:16px;height:calc(100vh - 20px)}
    body.layout-inset .side{margin:8px 0 8px 8px;border-radius:14px;height:calc(100vh - 16px)}
    body.surface-glass .side{background:rgba(15,23,42,.72);backdrop-filter:blur(8px)}
    body.surface-segmented .item{background:#102036;border-color:#294768}
    @media (max-width:900px){.wrap{grid-template-columns:1fr}.mobile{display:inline-block!important}.wrap.mini{grid-template-columns:1fr}.mini .brand .t,.mini .item .label,.mini .group{display:initial}}
    .mobile{display:none}
    .kbd{border:1px solid #2d425e;border-bottom-width:2px;border-radius:6px;padding:2px 6px;background:#112033;color:#c8dcf5}
    pre{white-space:pre-wrap}
  </style>
</head>
<body class="layout-fixed surface-solid density-cozy">
<div class="scrim" id="scrim"></div>
<div class="wrap" id="wrap">
  <aside class="side">
    <div class="brand">
      <img src="/padspan_ha_static/assets/padspan-mark.svg" alt="logo"/><b class="t">PadSpan HA</b>
    </div>
    <nav class="menu" id="menu">
      <div class="group">Main</div>
      <div class="item active" data-route="dashboard">🏠 <span class="label">Dashboard</span></div>
      <div class="item" data-route="map-lab">🗺️ <span class="label">Map Lab</span></div>
      <div class="item" data-route="presence">📡 <span class="label">Presence</span></div>
      <div class="group">Calibration</div>
      <div class="item" data-route="physical">📐 <span class="label">Physical</span></div>
      <div class="item" data-route="radio">📶 <span class="label">Radio</span></div>
      <div class="item" data-route="distortion">〰️ <span class="label">Distortion</span></div>
      <div class="item" data-route="combined">🧠 <span class="label">Combined</span></div>
    </nav>
  </aside>
  <section class="main">
    <div class="top">
      <div style="display:flex;gap:8px;align-items:center">
        <button id="mobile" class="btn mobile">☰</button>
        <button id="toggle" class="btn">Toggle Sidebar</button>
        <button id="preset" class="btn">Cycle Preset</button>
      </div>
      <div>Route: <span id="route">dashboard</span></div>
    </div>
    <div class="controls">
      <div><label>Layout</label><select id="layout"><option>fixed</option><option>inset</option><option>floating</option><option>overlay</option><option>offcanvas</option></select></div>
      <div><label>Width</label><select id="width"><option>full</option><option>mini</option><option>iconrail</option></select></div>
      <div><label>Surface</label><select id="surface"><option>solid</option><option>glass</option><option>segmented</option></select></div>
      <div><label>Density</label><select id="density"><option>cozy</option><option>compact</option><option>dense</option></select></div>
      <div><label>Nav</label><select id="nav"><option>classic</option><option>grouped</option><option>collapsible</option><option>nested</option></select></div>
    </div>
    <div class="cards">
      <div class="card"><h3>Keyboard</h3><p><span class="kbd">[</span> toggle sidebar<br><span class="kbd">Shift+[</span> cycle presets<br><span class="kbd">Esc</span> close overlay/mobile</p></div>
      <div class="card"><h3>State</h3><pre id="state"></pre></div>
      <div class="card"><h3>Brand</h3><img src="/padspan_ha_static/assets/padspan-logo.svg" alt="logo" style="width:120px;height:120px;border-radius:16px"/></div>
    </div>
  </section>
</div>
<script>
const LS='padspan_sidebar_v333';
const wrap=document.getElementById('wrap');
const stateEl=document.getElementById('state');
const routeEl=document.getElementById('route');
const state=Object.assign({layout:'fixed',width:'full',surface:'solid',density:'cozy',nav:'classic',open:false,route:'dashboard'}, JSON.parse(localStorage.getItem(LS)||'{}'));
const presets=[
  {layout:'fixed',width:'full',surface:'solid',density:'cozy',nav:'classic'},
  {layout:'inset',width:'mini',surface:'glass',density:'compact',nav:'grouped'},
  {layout:'floating',width:'iconrail',surface:'segmented',density:'dense',nav:'collapsible'},
  {layout:'overlay',width:'full',surface:'glass',density:'cozy',nav:'nested'},
  {layout:'offcanvas',width:'mini',surface:'solid',density:'compact',nav:'classic'},
  {layout:'fixed',width:'iconrail',surface:'segmented',density:'dense',nav:'grouped'},
  {layout:'inset',width:'full',surface:'glass',density:'cozy',nav:'collapsible'},
  {layout:'floating',width:'mini',surface:'solid',density:'compact',nav:'nested'},
  {layout:'overlay',width:'iconrail',surface:'segmented',density:'dense',nav:'grouped'},
  {layout:'offcanvas',width:'full',surface:'glass',density:'cozy',nav:'classic'},
  {layout:'fixed',width:'mini',surface:'solid',density:'dense',nav:'nested'},
  {layout:'floating',width:'full',surface:'glass',density:'compact',nav:'grouped'}
];
let pi=0;
function save(){localStorage.setItem(LS, JSON.stringify(state))}
function apply(){
  document.body.className=`layout-${state.layout} surface-${state.surface} density-${state.density}` + (state.open?' open':'');
  wrap.classList.toggle('mini', state.width!=='full');
  routeEl.textContent=state.route;
  document.querySelectorAll('.item[data-route]').forEach(i=>i.classList.toggle('active', i.dataset.route===state.route));
  document.body.classList.toggle('scrim', (state.layout==='overlay'||state.layout==='offcanvas'||window.innerWidth<900)&&state.open);
  document.getElementById('layout').value=state.layout;
  document.getElementById('width').value=state.width;
  document.getElementById('surface').value=state.surface;
  document.getElementById('density').value=state.density;
  document.getElementById('nav').value=state.nav;
  stateEl.textContent=JSON.stringify(state,null,2);
  save();
}
function toggle(){
  const overlayLike = state.layout==='overlay'||state.layout==='offcanvas'||window.innerWidth<900;
  if(overlayLike) state.open=!state.open;
  else wrap.classList.toggle('mini');
  apply();
}
document.getElementById('toggle').onclick=toggle;
document.getElementById('mobile').onclick=()=>{state.open=!state.open;apply();};
document.getElementById('preset').onclick=()=>{pi=(pi+1)%presets.length;Object.assign(state,presets[pi],{open:false});apply();};
document.getElementById('scrim').onclick=()=>{state.open=false;apply();}
['layout','width','surface','density','nav'].forEach(id=>document.getElementById(id).addEventListener('change',e=>{state[id]=e.target.value;if(id==='layout')state.open=false;apply();}));
document.getElementById('menu').addEventListener('click',e=>{const item=e.target.closest('.item[data-route]'); if(!item)return; state.route=item.dataset.route; if(window.innerWidth<900)state.open=false; apply();});
window.addEventListener('keydown',e=>{if(e.key==='['&&e.shiftKey){e.preventDefault();document.getElementById('preset').click();}else if(e.key==='['){e.preventDefault();toggle();}else if(e.key==='Escape'){state.open=false;apply();}});
window.addEventListener('resize',()=>{if(window.innerWidth>=900)state.open=false;apply()});
apply();
</script>
</body>
</html>
