set_room_tag_map:
  name: "Set Room Tag Map"
  description: "Replace the curated room_tag_map (room name → list of object keys). Persisted across restarts."
  fields:
    room_tag_map:
      required: true
      selector:
        object:

dump_devices:
  name: "Dump Devices"
  description: >
    Returns all tracked BLE devices with current room, RSSI, age, and smoothing state.
    Equivalent to Bermuda BLE Trilateration dump_devices service. Supports response data for
    use in templates, scripts, and automations. Also creates a persistent notification.
  target:
  fields:
    notify:
      description: "Create a persistent notification summary in HA (default true)."
      default: true
      selector:
        boolean:
