reload_ble_cache:
  name: Reload BLE cache
  description: Force PadSpan HA to reload Home Assistant's discovered BLE cache.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID if multiple PadSpan HA entries exist.
      required: false
      selector:
        text:

import_map_image:
  name: Import map image
  description: Import a floor/map image from /config into /config/www/padspan_ha/<entry_id>/.
  fields:
    map_id:
      name: Map ID
      description: Unique map ID, for example "main_floor".
      required: true
      selector:
        text:
    source_path:
      name: Source path
      description: Image path relative to /config, for example "www/maps/main_floor.png".
      required: true
      selector:
        text:
    overwrite:
      name: Overwrite
      description: Replace existing map image if one already exists for this map_id.
      required: false
      default: false
      selector:
        boolean:
    entry_id:
      name: Entry ID
      description: Optional config entry ID if multiple PadSpan HA entries exist.
      required: false
      selector:
        text:

set_map_anchor:
  name: Set map anchor
  description: Set or update BLE anchor coordinates for a map.
  fields:
    map_id:
      name: Map ID
      description: Target map ID.
      required: true
      selector:
        text:
    anchor_id:
      name: Anchor ID
      description: Logical anchor name, e.g. "bermuda_office".
      required: true
      selector:
        text:
    x:
      name: X
      description: X pixel coordinate on the map.
      required: true
      selector:
        number:
    y:
      name: Y
      description: Y pixel coordinate on the map.
      required: true
      selector:
        number:
    z:
      name: Z
      description: Optional Z coordinate (elevation/floor offset).
      required: false
      default: 0
      selector:
        number:
    weight:
      name: Weight
      description: Optional anchor confidence weight (default 1.0).
      required: false
      default: 1.0
      selector:
        number:
    entry_id:
      name: Entry ID
      description: Optional config entry ID if multiple PadSpan HA entries exist.
      required: false
      selector:
        text:
