import_map_image:
  name: Import map image
  description: Copy a map image into /config/www and register it for PadSpan.
  fields:
    entry_id:
      required: false
      example: "abcd1234"
      selector:
        text:
    map_id:
      required: true
      example: "main_floor"
      selector:
        text:
    source_path:
      required: true
      example: "www/maps/main_floor.png"
      selector:
        text:
    overwrite:
      required: false
      default: false
      selector:
        boolean:

set_map_anchor:
  name: Set map anchor
  description: Set/update an anchor (scanner/hub coordinate) on a map.
  fields:
    entry_id:
      required: false
      selector:
        text:
    map_id:
      required: true
      selector:
        text:
    anchor_id:
      required: true
      selector:
        text:
    source_id:
      required: true
      description: Scanner source id (e.g. Bermuda source / adapter MAC)
      selector:
        text:
    x:
      required: true
      selector:
        number:
          min: -100000
          max: 100000
          mode: box
    y:
      required: true
      selector:
        number:
          min: -100000
          max: 100000
          mode: box
    z:
      required: false
      default: 0
      selector:
        number:
          min: -10000
          max: 10000
          mode: box
    weight:
      required: false
      default: 1.0
      selector:
        number:
          min: 0.01
          max: 100
          step: 0.01
          mode: box
    name:
      required: false
      selector:
        text:

remove_map_anchor:
  name: Remove map anchor
  description: Remove an anchor from a map.
  fields:
    entry_id:
      required: false
      selector:
        text:
    map_id:
      required: true
      selector:
        text:
    anchor_id:
      required: true
      selector:
        text:

set_active_map:
  name: Set active map
  description: Set which map is currently used for position estimation.
  fields:
    entry_id:
      required: false
      selector:
        text:
    map_id:
      required: true
      selector:
        text:

reload_ble_cache:
  name: Reload BLE cache
  description: Pull all currently discovered BLE devices from Home Assistant cache.
  fields:
    entry_id:
      required: false
      selector:
        text:
