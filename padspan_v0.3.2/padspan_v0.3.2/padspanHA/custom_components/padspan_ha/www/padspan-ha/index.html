<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PadSpan HA v0.3.2</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>PadSpan HA</h1>
        <button id="collapseBtn" aria-label="Collapse sidebar">⮜</button>
      </div>
      <nav>
        <a href="#dashboard" data-route="dashboard" class="nav-link active">Dashboard</a>
        <a href="#map" data-route="map" class="nav-link">Map</a>
        <a href="#calibration" data-route="calibration" class="nav-link">Calibration</a>
        <a href="#devices" data-route="devices" class="nav-link">Devices</a>
        <a href="#settings" data-route="settings" class="nav-link">Settings</a>
      </nav>
      <div class="sidebar-footer">v0.3.2</div>
    </aside>

    <main class="main">
      <header class="toolbar">
        <button id="mobileMenuBtn" class="mobile-btn" aria-label="Open menu">☰</button>
        <h2 id="routeTitle">Dashboard</h2>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <template id="tpl-dashboard">
    <div class="card-grid">
      <article class="card">
        <h3>Status</h3>
        <p>Integration online.</p>
      </article>
      <article class="card">
        <h3>BLE Sources</h3>
        <p>Passive + connectable supported.</p>
      </article>
      <article class="card">
        <h3>Last calibration</h3>
        <p>Not run in this starter build.</p>
      </article>
    </div>
  </template>

  <template id="tpl-map">
    <div class="card">
      <h3>Map Canvas</h3>
      <p>Starter panel. Add drag anchors and room polygons in next patch.</p>
      <div class="canvas-placeholder">Map Canvas Placeholder</div>
    </div>
  </template>

  <template id="tpl-calibration">
    <div class="card">
      <h3>Calibration Wizard</h3>
      <ol>
        <li>Set scale</li>
        <li>Set rotation</li>
        <li>Reference points</li>
      </ol>
    </div>
  </template>

  <template id="tpl-devices">
    <div class="card">
      <h3>Device Discovery</h3>
      <p>Walk-to-identify workflow placeholder.</p>
    </div>
  </template>

  <template id="tpl-settings">
    <div class="card">
      <h3>Settings</h3>
      <p>Sidebar state persists across refresh.</p>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
